name: Android validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wrapper-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android components
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358" "cmake;3.22.1"
      - name: Validate dependency configuration
        run: ./gradlew :app:dependencies --configuration debugRuntimeClasspath
      - name: Assemble, test, and lint
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug
      - name: Upload FluxLab debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fluxlab-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fluxlab-validation-reports
          path: |
            **/build/reports/tests/**
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
            **/build/test-results/**
          if-no-files-found: warn
